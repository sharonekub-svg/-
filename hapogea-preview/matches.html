<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>הפוגע | עמוד משחקים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Heebo:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060810;
      --panel: #0e1319;
      --panel-2: #131920;
      --panel-3: #181f27;
      --line: rgba(255,255,255,.08);
      --line-strong: rgba(255,255,255,.14);
      --text: #f0eee8;
      --muted: #8fa3ae;
      --soft: #5a6e78;
      --green: #2ecc8a;
      --green-glow: rgba(46,204,138,.22);
      --red: #f04f50;
      --red-glow: rgba(240,79,80,.22);
      --gold: #f5be30;
      --gold-glow: rgba(245,190,48,.18);
      --cyan: #38d9f5;
      --cyan-glow: rgba(56,217,245,.18);
      --violet: #8b5cf6;
      --violet-glow: rgba(139,92,246,.20);
      --orange: #f07840;
      --shadow-sm: 0 4px 16px rgba(0,0,0,.28);
      --shadow-md: 0 12px 40px rgba(0,0,0,.38);
      --shadow-lg: 0 24px 80px rgba(0,0,0,.50);
      --r: 10px;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 40% at 5% 0%, rgba(56,217,245,.07), transparent),
        radial-gradient(ellipse 60% 35% at 95% 8%, rgba(139,92,246,.08), transparent),
        linear-gradient(175deg, #060810 0%, #0a0f16 50%, #060810 100%);
      color: var(--text);
      font-family: Assistant, Heebo, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select { font: inherit; cursor: pointer; }
    a { text-decoration: none; color: inherit; }
    img { display: block; }

    /* ══════════════════ TOPBAR ══════════════════ */
    .topbar {
      position: sticky;
      top: 0; z-index: 40;
      background: rgba(6,8,16,.90);
      backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 20px;
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .brand-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2ecc8a, #38d9f5);
      display: grid; place-items: center;
      font-size: 20px;
      box-shadow: 0 0 0 1px rgba(46,204,138,.3), 0 6px 18px rgba(46,204,138,.25);
      flex-shrink: 0;
    }
    .brand-text { line-height: 1; }
    .brand-text h1 { font: 900 22px/1 Heebo, sans-serif; letter-spacing: -0.5px; }
    .brand-text span { font-size: 11px; color: var(--muted); font-weight: 700; }
    .topbar-nav { display: flex; gap: 4px; margin-inline-start: auto; }
    .tnav-btn {
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 13px;
      transition: .15s ease;
      white-space: nowrap;
    }
    .tnav-btn:hover { color: var(--text); background: rgba(255,255,255,.06); }
    .tnav-btn.active { color: var(--cyan); background: rgba(56,217,245,.1); border-color: rgba(56,217,245,.25); }
    .topbar-actions { display: flex; gap: 8px; align-items: center; margin-inline-start: 8px; }
    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-icon {
      position: absolute;
      inset-inline-end: 10px;
      color: var(--soft);
      pointer-events: none;
      font-size: 14px;
    }
    .search-input {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line-strong);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 32px 8px 12px;
      width: 180px;
      outline: none;
      font-size: 13px;
      transition: .15s ease;
    }
    .search-input::placeholder { color: var(--soft); }
    .search-input:focus { border-color: rgba(56,217,245,.4); background: rgba(56,217,245,.05); width: 220px; }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(240,79,80,.12);
      border: 1px solid rgba(240,79,80,.3);
      color: #ff8080;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 0 rgba(240,79,80,.5);
      animation: pulse-red 1.4s ease infinite;
    }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 0 0 rgba(240,79,80,.5); }
      60% { box-shadow: 0 0 0 6px rgba(240,79,80,0); }
    }

    /* ══════════════════ SPORT FILTER BAR ══════════════════ */
    .filter-bar {
      background: rgba(6,8,16,.70);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 64px; z-index: 39;
    }
    .filter-bar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar-inner::-webkit-scrollbar { display: none; }
    .sport-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 800;
      font-size: 12px;
      white-space: nowrap;
      transition: .15s ease;
      flex-shrink: 0;
    }
    .sport-pill:hover { color: var(--text); background: rgba(255,255,255,.07); }
    .sport-pill.active { color: #06100c; background: var(--cyan); border-color: rgba(56,217,245,.7); }
    .sport-pill .sport-icon { font-size: 14px; }
    .divider-v { width: 1px; height: 24px; background: var(--line); flex-shrink: 0; }
    .status-filter {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .status-pill {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 900;
      transition: .15s ease;
      white-space: nowrap;
    }
    .status-pill:hover { color: var(--text); }
    .status-pill.active-live { color: #ff8080; background: rgba(240,79,80,.12); border-color: rgba(240,79,80,.3); }
    .status-pill.active-upcoming { color: #a5d8ff; background: rgba(56,130,245,.12); border-color: rgba(56,130,245,.3); }
    .status-pill.active-finished { color: var(--muted); background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.14); }
    .status-pill.active-all { color: var(--cyan); background: rgba(56,217,245,.1); border-color: rgba(56,217,245,.25); }
    .sort-select {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line-strong);
      color: var(--muted);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      outline: none;
      margin-inline-start: auto;
      flex-shrink: 0;
    }

    /* ══════════════════ SHELL ══════════════════ */
    .shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    /* ══════════════════ SECTION HEADER ══════════════════ */
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .section-head h2 {
      font: 900 17px/1 Heebo, sans-serif;
      color: var(--text);
    }
    .section-head .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 20px;
      border-radius: 999px;
      padding: 0 6px;
      font-size: 11px;
      font-weight: 900;
      background: rgba(255,255,255,.08);
      color: var(--muted);
    }
    .section-head .count-badge.live { background: rgba(240,79,80,.18); color: #ff8080; }
    .section-head .spacer { flex: 1; }
    .see-all-btn {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 800;
      transition: .15s ease;
    }
    .see-all-btn:hover { color: var(--text); border-color: var(--line-strong); }

    /* ══════════════════ LIVE STRIP (horizontal scroll) ══════════════════ */
    .live-section { margin-bottom: 28px; }
    .live-strip {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.1) transparent;
    }
    .live-strip::-webkit-scrollbar { height: 4px; }
    .live-strip::-webkit-scrollbar-track { background: transparent; }
    .live-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

    /* ══════════════════ MATCH CARD ══════════════════ */
    .mcard {
      background: rgba(14,19,25,.85);
      border: 1px solid var(--line);
      border-radius: var(--r);
      overflow: hidden;
      transition: border-color .18s ease, transform .18s ease, box-shadow .18s ease;
      position: relative;
      cursor: pointer;
      animation: card-in .35s ease both;
    }
    .mcard:hover {
      border-color: rgba(56,217,245,.28);
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(0,0,0,.35), 0 0 0 1px rgba(56,217,245,.08);
    }
    .mcard.live-card {
      border-color: rgba(240,79,80,.28);
      background: rgba(14,19,25,.92);
    }
    .mcard.live-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--orange), var(--red));
      background-size: 200% 100%;
      animation: slide-bar 2s linear infinite;
    }
    @keyframes slide-bar {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    .mcard.fav-card { border-color: rgba(245,190,48,.28); }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card in live strip */
    .live-strip .mcard {
      flex: 0 0 280px;
      min-width: 280px;
    }

    /* Card in main grid */
    .match-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 10px;
    }

    /* CARD TOP */
    .mcard-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 11px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.025);
    }
    .league-info { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .league-icon { font-size: 13px; flex-shrink: 0; }
    .league-name {
      font-size: 11px;
      font-weight: 900;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .time-label { font-size: 11px; font-weight: 800; color: var(--soft); }
    .match-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 5px;
      padding: 3px 7px;
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }
    .match-status-badge.live-st {
      background: rgba(240,79,80,.15);
      border: 1px solid rgba(240,79,80,.3);
      color: #ff8888;
    }
    .match-status-badge.upcoming-st {
      background: rgba(56,130,245,.1);
      border: 1px solid rgba(56,130,245,.25);
      color: #80b4ff;
    }
    .match-status-badge.finished-st {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--muted);
    }
    .min-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(240,79,80,.18);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 10px;
      font-weight: 900;
      color: #ff8888;
    }
    .fav-btn {
      background: transparent;
      border: none;
      color: var(--soft);
      font-size: 14px;
      padding: 2px;
      transition: color .15s ease, transform .15s ease;
      flex-shrink: 0;
    }
    .fav-btn:hover { color: var(--gold); transform: scale(1.15); }
    .fav-btn.active { color: var(--gold); }

    /* CARD BODY */
    .mcard-body { padding: 12px; }
    .teams-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      direction: ltr;
      margin-bottom: 10px;
    }
    .team-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      direction: rtl;
      min-width: 0;
    }
    .team-logo {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.06);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex-shrink: 0;
      font-weight: 900;
      font-size: 13px;
      color: var(--muted);
      transition: .18s ease;
    }
    .team-logo img { width: 70%; height: 70%; object-fit: contain; }
    .team-col.winner-side .team-logo {
      border-color: rgba(46,204,138,.7);
      box-shadow: 0 0 0 3px rgba(46,204,138,.15);
    }
    .team-name-card {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.2;
    }
    .team-col.winner-side .team-name-card { color: #bff8dc; }
    .score-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }
    .score-display {
      font: 900 26px/1 Heebo, sans-serif;
      color: var(--text);
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .score-display.live-score { color: #ff9090; text-shadow: 0 0 16px rgba(240,79,80,.4); }
    .vs-label { font-size: 12px; color: var(--soft); font-weight: 700; }
    .score-time { font-size: 10px; color: var(--soft); font-weight: 800; }

    /* ODDS ROW */
    .odds-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      margin-bottom: 8px;
    }
    .odd-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius: 7px;
      padding: 7px 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: .15s ease;
      cursor: pointer;
    }
    .odd-btn:hover { border-color: var(--gold); background: rgba(245,190,48,.08); }
    .odd-btn.selected { border-color: rgba(46,204,138,.7); background: rgba(46,204,138,.12); }
    .odd-btn.selected .odd-val { color: var(--green); }
    .odd-label { font-size: 9px; color: var(--soft); font-weight: 900; text-transform: uppercase; }
    .odd-val { font: 900 14px/1 Heebo, sans-serif; color: var(--gold); }
    .odd-val.up { color: #5edb8a; }
    .odd-val.down { color: #f07575; }
    .odd-arrow { font-size: 9px; }
    .odd-arrow.up { color: #5edb8a; }
    .odd-arrow.down { color: #f07575; }

    /* CARD FOOTER */
    .mcard-footer {
      border-top: 1px solid var(--line);
      padding: 7px 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .stat-mini { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--soft); font-weight: 800; }
    .stat-mini-icon { font-size: 12px; }
    .open-detail-btn {
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 900;
      transition: .15s ease;
      white-space: nowrap;
    }
    .open-detail-btn:hover { color: var(--text); background: rgba(255,255,255,.07); }

    /* ══════════════════ GROUPS / LEAGUES ══════════════════ */
    .league-group { margin-bottom: 28px; }
    .league-group-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,.025);
      border: 1px solid var(--line);
      margin-bottom: 10px;
      cursor: pointer;
    }
    .league-group-head .league-icon-lg { font-size: 16px; }
    .league-group-head .league-title { font-size: 13px; font-weight: 900; color: var(--text); }
    .league-group-head .league-sub { font-size: 11px; color: var(--muted); margin-inline-start: auto; }
    .league-group-head .chevron { color: var(--soft); transition: transform .2s ease; font-size: 12px; }
    .league-group-head.collapsed .chevron { transform: rotate(-90deg); }
    .league-group-body { display: grid; gap: 8px; }
    .league-group-body.collapsed { display: none; }

    /* Compact match row (for grouped view) */
    .match-row {
      background: rgba(14,19,25,.80);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: .15s ease;
    }
    .match-row:hover { border-color: rgba(56,217,245,.22); background: rgba(56,217,245,.03); }
    .match-row.live-row { border-color: rgba(240,79,80,.22); }
    .match-time-col { text-align: center; min-width: 44px; }
    .match-time-col .match-time { font-size: 12px; font-weight: 900; color: var(--muted); }
    .match-time-col .match-min { font-size: 10px; color: #ff8888; font-weight: 900; }
    .match-teams-col { display: grid; gap: 4px; min-width: 0; }
    .match-team-row { display: flex; align-items: center; gap: 7px; }
    .match-team-logo { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,.06); border: 1px solid var(--line); overflow: hidden; display: grid; place-items: center; font-size: 9px; color: var(--soft); font-weight: 900; flex-shrink: 0; }
    .match-team-logo img { width: 80%; height: 80%; object-fit: contain; }
    .match-team-name { font-size: 12px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .match-team-name.winner { color: #bff8dc; }
    .match-odds-col { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
    .mini-odd {
      width: 42px;
      height: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: rgba(255,255,255,.03);
      transition: .12s ease;
    }
    .mini-odd:hover { border-color: var(--gold); background: rgba(245,190,48,.07); }
    .mini-odd.selected { border-color: rgba(46,204,138,.5); background: rgba(46,204,138,.08); }
    .mini-odd-label { font-size: 8px; color: var(--soft); font-weight: 900; }
    .mini-odd-val { font-size: 11px; font-weight: 900; color: var(--gold); line-height: 1; }
    .mini-odd.selected .mini-odd-val { color: var(--green); }
    .match-score-col { display: flex; gap: 4px; align-items: center; min-width: 44px; justify-content: flex-end; }
    .row-score { font: 900 15px/1 Heebo, sans-serif; color: var(--text); letter-spacing: 1px; }
    .row-score.live { color: #ff9090; }

    /* ══════════════════ DETAIL DRAWER ══════════════════ */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,8,.78);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed;
      top: 0; bottom: 0;
      inset-inline-end: 0;
      z-index: 51;
      width: min(520px, 100vw);
      background: var(--panel);
      border-inline-start: 1px solid var(--line-strong);
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.32,.72,0,1);
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }
    html[dir="rtl"] .drawer { transform: translateX(-100%); }
    .drawer.open { transform: translateX(0); }
    html[dir="rtl"] .drawer.open { transform: translateX(0); }

    .drawer-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.02);
      position: sticky;
      top: 0;
      z-index: 2;
      backdrop-filter: blur(10px);
    }
    .drawer-head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .drawer-league { display: flex; align-items: center; gap: 8px; }
    .drawer-league-icon { font-size: 16px; }
    .drawer-league-name { font-size: 12px; font-weight: 900; color: var(--muted); }

      display: grid;

    .drawer-close:hover { color: var(--text); border-color: var(--line-strong); }

    /* Big match display in drawer */

      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      direction: ltr;
    }
    .drawer-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      direction: rtl;
    }
    .drawer-logo {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 1.5px solid var(--line-strong);
      background: rgba(255,255,255,.07);

      place-items: center;

      color: var(--muted);
      font-weight: 900;
      overflow: hidden;

    .drawer-score-sub { font-size: 11px; color: var(--soft); font-weight: 800; text-align: center; }
    .drawer-live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(240,79,80,.14);
      border: 1px solid rgba(240,79,80,.3);

      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
      color: #ff8888;

      gap: 2px;
      margin-top: 14px;
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      padding: 3px;

      border: none;
      background: transparent;
      color: var(--muted);

      font-weight: 900;

      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .stat-bar-wrap { height: 6px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 999px; transition: width .6s cubic-bezier(.4,0,.2,1); }

    .stat-bar-fill.away-fill { background: linear-gradient(90deg, var(--orange), var(--red)); float: right; }
    .stat-bar-label { font-size: 10px; color: var(--soft); font-weight: 900; text-align: center; white-space: nowrap; }
    .stat-bar-val { font-size: 12px; font-weight: 900; color: var(--text); text-align: center; }

    .stat-bar-row .left-val { font-size: 12px; font-weight: 900; color: var(--text); text-align: start; }
    .stat-bar-row .right-val { font-size: 12px; font-weight: 900; color: var(--text); text-align: end; }

      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.025);
      margin-bottom: 12px;

    .poss-ring { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
    .poss-ring svg { transform: rotate(-90deg); }
    .poss-ring-text { position: absolute; inset: 0; display: grid; place-items: center; font: 900 14px/1 Heebo, sans-serif; color: var(--text); }
    .poss-details { display: grid; gap: 4px; flex: 1; min-width: 0; }
    .poss-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 11px; }
    .poss-label { color: var(--muted); font-weight: 700; }
    .poss-val { font-weight: 900; color: var(--text); }
    .poss-home { color: var(--cyan); }
    .poss-away { color: var(--orange); }

    .market-section { margin-top: 4px; }

      font-size: 11px;
      font-weight: 900;
      color: var(--soft);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 5px;

    .market-outcome {

      align-items: center;

      background: rgba(255,255,255,.03);
      cursor: pointer;

    .market-outcome .mo-val { font: 900 15px/1 Heebo, sans-serif; color: var(--gold); }
    .market-outcome.selected .mo-val { color: var(--green); }

    .timeline-list { display: grid; gap: 8px; }

    .h2h-match {

      gap: 8px;

      padding: 2px 7px;
      font: 900 11px/1.4 Heebo, sans-serif;
      color: var(--text);
    }
    .h2h-match .date { color: var(--soft); font-size: 10px; font-weight: 800; }

    /* ══════════════════ EMPTY / LOADING ══════════════════ */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      border: 1px dashed var(--line-strong);
      border-radius: var(--r);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* SKELETON LOADERS */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ══════════════════ REFRESH BAR ══════════════════ */
    #refreshBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      z-index: 100;
      overflow: hidden;
      opacity: 0;
      transition: opacity .2s;
    }
    #refreshBar.active { opacity: 1; }
    #refreshBar::after {
      content: "";
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--violet), var(--cyan));
      background-size: 200% 100%;
      animation: slide-bar 1.4s linear infinite;
    }

    /* ══════════════════ RESPONSIVE ══════════════════ */
    @media (max-width: 768px) {
      .topbar-nav { display: none; }
      .search-input { width: 140px; }
      .search-input:focus { width: 160px; }
      .match-grid { grid-template-columns: 1fr; }
      .drawer { width: 100vw; }
      .live-strip .mcard { flex: 0 0 260px; min-width: 260px; }
      .match-odds-col { display: none; }
      .filter-bar-inner { gap: 7px; }
    }
    @media (max-width: 480px) {
      .topbar-inner { gap: 10px; padding: 0 12px; }
      .shell { padding: 14px 12px 60px; }
      .brand-text span { display: none; }
    }

    /* ══════════════════ MISC ══════════════════ */
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .pulse-live {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 0 rgba(240,79,80,.5);
      animation: pulse-red 1.4s ease infinite;
    }
    .transition-all { transition: all .2s ease; }
    .no-scroll { overflow: hidden; }

    /* Tooltip */
    [data-tip] { position: relative; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2830;
      border: 1px solid var(--line-strong);
      color: var(--text);
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 5px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>

/* ═══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let activeSport = 'all';
let activeStatus = 'all';
let favorites = JSON.parse(localStorage.getItem('hpg_favs') || '[]');
let oddsDir = {}; // track odds movement

/* ═══════════════════════════════════════════
   FILTERS
══════════════════════════════════════════ */
function setSport(el, sport) {
  activeSport = sport;
  document.querySelectorAll('.sport-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function setStatus(el, status) {
  activeStatus = status;
  document.querySelectorAll('.status-pill').forEach(b => {
    b.classList.remove('active-all','active-live','active-upcoming','active-finished');
  });
  const map = {all:'active-all', live:'active-live', upcoming:'active-upcoming', finished:'active-finished', fav:'active-all'};
  el.classList.add(map[status] || 'active-all');
  renderAll();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let list = MATCHES.filter(m => {
    if (activeSport !== 'all' && m.sport !== activeSport) return false;
    if (activeStatus === 'fav' && !favorites.includes(m.id)) return false;
    if (activeStatus !== 'all' && activeStatus !== 'fav' && m.status !== activeStatus) return false;
    if (q) {
      const text = `${m.home} ${m.away} ${m.league} ${m.region}`.toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;
  });
  if (sort === 'live') list.sort((a,b) => (b.status==='live'?1:0)-(a.status==='live'?1:0));
  else if (sort === 'league') list.sort((a,b) => a.league.localeCompare(b.league));
  else list.sort((a,b) => {
    const order = {live:0, upcoming:1, finished:2};
    if (order[a.status] !== order[b.status]) return order[a.status]-order[b.status];
    if (a.kickoff && b.kickoff) return a.kickoff-b.kickoff;
    return 0;
  });
  return list;
}

/* ═══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function renderAll() {
  const all = getFiltered();
  const live = all.filter(m => m.status==='live');
  const upcoming = all.filter(m => m.status==='upcoming');
  const finished = all.filter(m => m.status==='finished');

  // Live count badge
  const liveCountEl = document.getElementById('liveCount');
  const liveSectionCountEl = document.getElementById('liveSectionCount');
  liveCountEl.textContent = MATCHES.filter(m=>m.status==='live').length;
  liveSectionCountEl.textContent = live.length;

  const isFiltered = activeSport !== 'all' || activeStatus !== 'all' || document.getElementById('searchInput').value.trim();

  if (isFiltered && activeStatus !== 'all') {
    // Show filtered view
    document.getElementById('liveSection').style.display = 'none';
    document.getElementById('upcomingSection').style.display = 'none';
    document.getElementById('finishedSection').style.display = 'none';
    document.getElementById('filteredSection').style.display = 'block';

    const titleMap = {live:'משחקים חיים', upcoming:'משחקים קרובים', finished:'תוצאות', fav:'מועדפים'};
    document.getElementById('filteredTitle').textContent = titleMap[activeStatus] || 'משחקים';
    document.getElementById('filteredCount').textContent = all.length;
    document.getElementById('filteredGrid').innerHTML = all.map(cardHTML).join('') ||
      `<div class="empty-state"><div class="empty-icon">🔍</div><p>לא נמצאו משחקים</p></div>`;
  } else {
    document.getElementById('liveSection').style.display = live.length ? 'block' : 'none';
    document.getElementById('upcomingSection').style.display = 'block';
    document.getElementById('finishedSection').style.display = 'block';
    document.getElementById('filteredSection').style.display = 'none';

    // Live strip
    document.getElementById('liveStrip').innerHTML = live.map(liveCardHTML).join('');
    // Upcoming
    document.getElementById('upcomingCount').textContent = upcoming.length;
    document.getElementById('upcomingGrid').innerHTML = upcoming.map(cardHTML).join('') ||
      `<div class="empty-state"><div class="empty-icon">🕐</div><p>אין משחקים קרובים</p></div>`;
    // Finished
    document.getElementById('finishedCount').textContent = finished.length;
    document.getElementById('finishedGrid').innerHTML = finished.map(cardHTML).join('') ||
      `<div class="empty-state"><div class="empty-icon">✓</div><p>אין תוצאות</p></div>`;
  }
  attachCardHandlers();
}

function liveCardHTML(m) {
  return `<div class="mcard live-card" data-id="${m.id}" style="animation-delay:${(m.id%5)*0.05}s">
    ${cardTopHTML(m)}
    ${cardBodyHTML(m)}
    ${cardFooterHTML(m)}
  </div>`;
}

function cardHTML(m) {
  return `<div class="mcard${m.status==='live'?' live-card':''}${favorites.includes(m.id)?' fav-card':''}" data-id="${m.id}" style="animation-delay:${(m.id%8)*0.04}s">
    ${cardTopHTML(m)}
    ${cardBodyHTML(m)}
    ${cardFooterHTML(m)}
  </div>`;
}

function cardTopHTML(m) {
  const statusBadge = {
    live: `<span class="match-status-badge live-st"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#f04f50;margin-left:3px;animation:pulse-red 1.4s infinite"></span>${m.quarter ? `רבע ${m.quarter}` : `${m.minute}′`}</span>`,
    upcoming: `<span class="match-status-badge upcoming-st">${m.kickoff ? fmtTime(m.kickoff) : 'בקרוב'}</span>`,
    finished: `<span class="match-status-badge finished-st">סיום</span>`,

  const favStar = `<button class="fav-btn${favorites.includes(m.id)?' active':''}" data-fav="${m.id}" title="מועדפים">
    ${favorites.includes(m.id) ? '⭐' : '☆'}

  return `<div class="mcard-top">
    <div class="league-info">
      <span class="league-icon">${m.leagueIcon}</span>
      <span class="league-name">${m.league}</span>
    </div>
    <div class="card-right">

}

function cardBodyHTML(m) {
  const hasScore = m.score !== null;
  const homeWinner = hasScore && m.status==='finished' && m.score.home > m.score.away;
  const awayWinner = hasScore && m.status==='finished' && m.score.home < m.score.away;

  let centerContent;
  if (hasScore) {
    const scoreClass = m.status==='live' ? ' live-score' : '';
    centerContent = `<span class="score-display${scoreClass}">${m.score.home} – ${m.score.away}</span>

  const drawOdd = m.odds.draw

    : `<div class="odd-btn" style="opacity:.3;pointer-events:none"><span class="odd-label">–</span><span class="odd-val">–</span></div>`;

  return `<div class="mcard-body">
    <div class="teams-row">
      <div class="team-col${homeWinner?' winner-side':''}">
        <div class="team-logo">${m.homeLogo ? `<img src="${m.homeLogo}" alt="${m.home}" onerror="this.style.display='none';this.parentNode.textContent='${m.home.substring(0,2)}'">` : m.home.substring(0,2)}</div>
        <span class="team-name-card">${m.home}</span>
      </div>
      <div class="score-center">${centerContent}</div>
      <div class="team-col${awayWinner?' winner-side':''}">
        <div class="team-logo">${m.awayLogo ? `<img src="${m.awayLogo}" alt="${m.away}" onerror="this.style.display='none';this.parentNode.textContent='${m.away.substring(0,2)}'">` : m.away.substring(0,2)}</div>
        <span class="team-name-card">${m.away}</span>
      </div>
    </div>
    <div class="odds-row">
      <div class="odd-btn" data-mid="${m.id}" data-type="home"><span class="odd-label">1 ${m.home.substring(0,8)}</span><span class="odd-val">${m.odds.home.toFixed(2)}</span></div>
      ${drawOdd}
      <div class="odd-btn" data-mid="${m.id}" data-type="away"><span class="odd-label">2 ${m.away.substring(0,8)}</span><span class="odd-val">${m.odds.away.toFixed(2)}</span></div>

function cardFooterHTML(m) {
  const miniStats = m.stats
    ? `<span class="stat-mini"><span class="stat-mini-icon">⚽</span>${m.stats.shots ? m.stats.shots[0]+'-'+m.stats.shots[1] : ''} כדורים</span>
       <span class="stat-mini"><span class="stat-mini-icon">📐</span>${m.stats.corners ? m.stats.corners[0]+'-'+m.stats.corners[1] : ''} קרנות</span>`
    : `<span class="stat-mini" style="color:var(--soft)">אין סטטיסטיקות</span>`;

  return `<div class="mcard-footer">
    ${miniStats}
    <button class="open-detail-btn" data-open="${m.id}">פרטים ›</button>
  </div>`;
}

/* ═══════════════════════════════════════════
   CARD HANDLERS
══════════════════════════════════════════ */
function attachCardHandlers() {
  // Fav buttons
  document.querySelectorAll('[data-fav]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.fav);
      if (favorites.includes(id)) favorites = favorites.filter(x=>x!==id);
      else favorites.push(id);
      localStorage.setItem('hpg_favs', JSON.stringify(favorites));
      renderAll();
    };
  });

  // Odds buttons
  document.querySelectorAll('.odd-btn[data-mid]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const mid = btn.dataset.mid;
      document.querySelectorAll(`.odd-btn[data-mid="${mid}"]`).forEach(b => b.classList.remove('selected'));
      btn.classList.toggle('selected');
    };
  });

  // Open detail
  document.querySelectorAll('[data-open]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      openDrawer(parseInt(btn.dataset.open));
    };
  });

  // Card click
  document.querySelectorAll('.mcard').forEach(card => {
    card.onclick = () => openDrawer(parseInt(card.dataset.id));
  });
}

/* ═══════════════════════════════════════════
   DRAWER
══════════════════════════════════════════ */
let activeDrawerTab = 'overview';

function openDrawer(id) {
  const m = MATCHES.find(x => x.id===id);
  if (!m) return;
  document.body.classList.add('no-scroll');
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('matchDrawer').classList.add('open');
  renderDrawer(m);
}

function closeDrawer() {
  document.body.classList.remove('no-scroll');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('matchDrawer').classList.remove('open');
}

function renderDrawer(m) {
  const hasScore = m.score !== null;
  const isLive = m.status === 'live';
  const statusLabel = {live:'חי', upcoming:'קרוב', finished:'נגמר'}[m.status];

  const scoreHTML = hasScore
    ? `<span class="drawer-score${isLive?' live':''}">${m.score.home} – ${m.score.away}</span>`
    : `<span class="drawer-score" style="font-size:24px;color:var(--soft)">נגד</span>`;

  const centerBottom = isLive
    ? `<div class="drawer-live-badge"><span class="live-dot"></span> ${m.quarter ? `רבע ${m.quarter} · ${m.quarterTime}` : `${m.minute}′`}</div>`
    : `<span class="drawer-score-sub">${statusLabel}${m.kickoff ? ' · ' + fmtTime(m.kickoff) : ''}</span>`;

  const drawer = document.getElementById('matchDrawer');
  drawer.innerHTML = `
    <div class="drawer-head">
      <div class="drawer-head-row">
        <div class="drawer-league">
          <span class="drawer-league-icon">${m.leagueIcon}</span>
          <span class="drawer-league-name">${m.league} · ${m.region}</span>
        </div>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
      </div>

      <div class="drawer-match">
        <div class="drawer-team">
          <div class="drawer-logo">${m.homeLogo ? `<img src="${m.homeLogo}" alt="${m.home}" onerror="this.style.display='none'">` : m.home.substring(0,2)}</div>
          <span class="drawer-team-name">${m.home}</span>
        </div>
        <div class="drawer-center">
          ${scoreHTML}
          ${centerBottom}
        </div>
        <div class="drawer-team">
          <div class="drawer-logo">${m.awayLogo ? `<img src="${m.awayLogo}" alt="${m.away}" onerror="this.style.display='none'">` : m.away.substring(0,2)}</div>
          <span class="drawer-team-name">${m.away}</span>
        </div>
      </div>

      <div class="drawer-tabs">
        <button class="drawer-tab${activeDrawerTab==='overview'?' active':''}" onclick="switchDrawerTab(this,'overview','${m.id}')">סקירה</button>
        <button class="drawer-tab${activeDrawerTab==='stats'?' active':''}" onclick="switchDrawerTab(this,'stats','${m.id}')">סטטיסטיקות</button>
        <button class="drawer-tab${activeDrawerTab==='odds'?' active':''}" onclick="switchDrawerTab(this,'odds','${m.id}')">יחסים</button>
        <button class="drawer-tab${activeDrawerTab==='h2h'?' active':''}" onclick="switchDrawerTab(this,'h2h','${m.id}')">היסטוריה</button>
      </div>
    </div>

    <div class="drawer-body" id="drawerBody">
      ${renderDrawerTab(m, activeDrawerTab)}
    </div>
  `;
}

function switchDrawerTab(el, tab, mid) {
  activeDrawerTab = tab;
  document.querySelectorAll('.drawer-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const m = MATCHES.find(x => x.id===parseInt(mid));
  document.getElementById('drawerBody').innerHTML = renderDrawerTab(m, tab);
  // Animate stat bars
  if (tab === 'stats') setTimeout(animateStatBars, 50);
}

function renderDrawerTab(m, tab) {
  if (tab === 'overview') return renderOverviewTab(m);
  if (tab === 'stats') return renderStatsTab(m);
  if (tab === 'odds') return renderOddsTab(m);
  if (tab === 'h2h') return renderH2HTab(m);
  return '';
}

function renderOverviewTab(m) {
  const hasTimeline = m.timeline && m.timeline.length > 0;

  const timelineHTML = hasTimeline
    ? m.timeline.map(e => {
        const icons = {goal:'⚽', yellow:'🟨', red:'🟥', score:'🏀', sub:'🔄'};
        const teamLabel = e.team==='home' ? m.home.substring(0,10) : m.away.substring(0,10);
        return `<div class="timeline-item">
          <div class="timeline-min">${e.min}′</div>
          <div class="timeline-content">
            <span class="timeline-icon">${icons[e.type]||'•'}</span>
            <div>
              <div class="timeline-text">${e.player}</div>
              <div class="timeline-sub">${teamLabel}</div>
            </div>
          </div>
        </div>`;
      }).join('')
    : '<div style="color:var(--soft);font-size:13px;padding:8px 0">אין אירועים עדיין</div>';

  const nextMatchInfo = m.status==='upcoming' && m.kickoff
    ? `<div style="border:1px solid var(--line);border-radius:8px;padding:12px;background:rgba(56,130,245,.06);border-color:rgba(56,130,245,.2);margin-bottom:12px">
        <div style="font-size:11px;color:#80b4ff;font-weight:900;margin-bottom:6px">⏰ השעה להתחלה</div>
        <div style="font:900 28px/1 Heebo,sans-serif;color:var(--text)">${fmtTime(m.kickoff)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${formatCountdown(m.kickoff)}</div>
      </div>`
    : '';

  return `<div class="drawer-section">
    <h4>אירועי משחק</h4>
    ${nextMatchInfo}
    <div class="timeline-list">${timelineHTML}</div>
  </div>`;
}

function renderStatsTab(m) {
  if (!m.stats) return '<div style="color:var(--soft);font-size:13px;padding:8px 0;text-align:center">סטטיסטיקות לא זמינות</div>';

  const isBball = m.sport === 'basketball';

  let rows = [];
  if (m.stats.possession) rows.push({label:'החזקה',home:m.stats.possession[0],away:m.stats.possession[1],unit:'%',maxVal:100});
  if (m.stats.shots) rows.push({label:'בעיטות',home:m.stats.shots[0],away:m.stats.shots[1],unit:'',maxVal:Math.max(m.stats.shots[0],m.stats.shots[1],1)*1.2});
  if (m.stats.shotsOnTarget) rows.push({label:'מסגרת',home:m.stats.shotsOnTarget[0],away:m.stats.shotsOnTarget[1],unit:'',maxVal:Math.max(m.stats.shotsOnTarget[0],m.stats.shotsOnTarget[1],1)*1.2});
  if (m.stats.corners) rows.push({label:'קרנות',home:m.stats.corners[0],away:m.stats.corners[1],unit:'',maxVal:Math.max(m.stats.corners[0],m.stats.corners[1],1)*1.2});
  if (m.stats.yellowCards) rows.push({label:'צהוב',home:m.stats.yellowCards[0],away:m.stats.yellowCards[1],unit:'',maxVal:Math.max(m.stats.yellowCards[0],m.stats.yellowCards[1],1)*1.2});
  if (m.stats.fgPct) rows.push({label:'FG%',home:m.stats.fgPct[0],away:m.stats.fgPct[1],unit:'%',maxVal:100});
  if (m.stats.threePct) rows.push({label:'3PT%',home:m.stats.threePct[0],away:m.stats.threePct[1],unit:'%',maxVal:100});

  const barsHTML = rows.map(r => {
    const homeW = Math.min(100, (r.home/r.maxVal)*100);
    const awayW = Math.min(100, (r.away/r.maxVal)*100);
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font:900 12px/1 Heebo,sans-serif;color:var(--text)">${r.home}${r.unit}</span>

          <defs>

              <stop offset="100%" stop-color="#8b5cf6"/>

  return `<div class="drawer-section">
    <h4>סטטיסטיקות משחק</h4>

}

/* ═══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function formatCountdown(date) {
  const diff = date - NOW;
  if (diff <= 0) return 'עכשיו';
  const mins = Math.floor(diff/60000);
  if (mins < 60) return `בעוד ${mins} דק׳`;
  const hrs = Math.floor(mins/60);
  return `בעוד ${hrs} שעות`;
}

/* ═══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', () => {
  const q = document.getElementById('searchInput').value.trim();
  if (q) {
    activeStatus = 'search';
    document.getElementById('filteredSection').style.display = 'block';
    document.getElementById('liveSection').style.display = 'none';
    document.getElementById('upcomingSection').style.display = 'none';
    document.getElementById('finishedSection').style.display = 'none';
    document.getElementById('filteredTitle').textContent = `תוצאות לחיפוש "${q}"`;
    const results = MATCHES.filter(m => {
      const text = `${m.home} ${m.away} ${m.league} ${m.region}`.toLowerCase();
      return text.includes(q.toLowerCase());
    });
    document.getElementById('filteredCount').textContent = results.length;
    document.getElementById('filteredGrid').innerHTML = results.map(cardHTML).join('') ||
      `<div class="empty-state"><div class="empty-icon">🔍</div><p>לא נמצאו תוצאות עבור "${q}"</p></div>`;
    attachCardHandlers();
  } else {
    activeStatus = 'all';
    document.querySelectorAll('.status-pill').forEach(b => b.classList.remove('active-all','active-live','active-upcoming','active-finished'));
    document.querySelector('[data-status=all]').classList.add('active-all');
    renderAll();
  }
});

/* ═══════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDrawer();
  if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

/* ═══════════════════════════════════════════
   SIMULATE LIVE UPDATES
══════════════════════════════════════════ */
function simulateLiveUpdates() {
  const liveMatches = MATCHES.filter(m => m.status === 'live');
  liveMatches.forEach(m => {
    if (m.minute !== null && m.minute < 90) {
      m.minute += 1;
    }
    // Random small odds fluctuation
    const fluctuate = v => Math.max(1.01, +(v + (Math.random()-.5)*0.04).toFixed(2));
    const prev = {...m.odds};
    m.odds.home = fluctuate(m.odds.home);
    if (m.odds.draw) m.odds.draw = fluctuate(m.odds.draw);
    m.odds.away = fluctuate(m.odds.away);
    oddsDir[m.id] = {
      home: m.odds.home > prev.home ? 'up' : m.odds.home < prev.home ? 'down' : '',
      draw: m.odds.draw && m.odds.draw > prev.draw ? 'up' : 'down',
      away: m.odds.away > prev.away ? 'up' : m.odds.away < prev.away ? 'down' : '',
    };
  });
  // Show refresh bar briefly
  const bar = document.getElementById('refreshBar');
  bar.classList.add('active');
  setTimeout(() => bar.classList.remove('active'), 800);

  renderAll();
}

/* ═══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
renderAll();
setInterval(simulateLiveUpdates, 15000); // Update every 15s
