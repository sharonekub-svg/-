<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>הפוגע AI — אינטליגנציית ספורט</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FAF8F4;
    --surface: #FFFFFF;
    --surface-2: #F3EFE8;
    --surface-3: #ECE7DD;
    --text: #211F1B;
    --text-muted: #6E675C;
    --text-faint: #A39B8C;
    --border: #EAE4D9;
    --border-strong: #DDD5C7;
    --accent: #2563EB;
    --accent-press: #1D4ED8;
    --accent-soft: rgba(37,99,235,0.10);
    --accent-line: rgba(37,99,235,0.22);
    --warn: #B45309;
    --warn-soft: #FBF1DF;
    --good: #15803D;
    --radius-lg: 22px;
    --radius: 16px;
    --radius-sm: 11px;
    --shadow-sm: 0 1px 2px rgba(40,33,22,0.04), 0 1px 1px rgba(40,33,22,0.03);
    --shadow: 0 4px 16px -6px rgba(40,33,22,0.10), 0 1px 3px rgba(40,33,22,0.05);
    --shadow-lg: 0 18px 48px -16px rgba(40,33,22,0.20), 0 4px 12px -4px rgba(40,33,22,0.08);
    --shadow-glow: 0 0 0 4px var(--accent-soft);
    --col-w: 720px;
    --msg-gap: 34px;
    --pad: 28px;
    --font-base: 16.5px;
    --sidebar-w: 280px;
    font-family: 'Assistant', system-ui, sans-serif;
  }
  [data-density="compact"] { --msg-gap: 22px; --pad: 20px; --font-base: 15.5px; --col-w: 700px; }
  [data-density="comfy"]   { --msg-gap: 46px; --pad: 36px; --font-base: 17.5px; --col-w: 760px; }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Assistant', system-ui, sans-serif;
    font-size: var(--font-base);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  #root { height: 100%; }
  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: "tnum"; letter-spacing: -0.02em; }
  ::selection { background: var(--accent-soft); }

  /* ---------- App shell ---------- */
  .app { display: flex; height: 100%; width: 100%; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--surface-2);
    border-inline-start: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: width .34s cubic-bezier(.4,0,.2,1), margin .34s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .sidebar.collapsed { width: 0; margin-inline-start: 0; border: none; }
  .sb-inner { width: var(--sidebar-w); display: flex; flex-direction: column; height: 100%; }
  .sb-head { padding: 18px 18px 10px; }
  .brand { display: flex; align-items: center; gap: 11px; padding: 6px 6px 16px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(150deg, var(--accent), #5B8DEF);
    display: grid; place-items: center; color: #fff;
    box-shadow: 0 4px 12px -3px var(--accent-line);
  }
  .brand-name { font-weight: 800; font-size: 18px; letter-spacing: -0.01em; }
  .brand-name small { font-weight: 600; color: var(--accent); }
  .brand-sub { font-size: 11.5px; color: var(--text-faint); font-weight: 500; margin-top: -3px; }

  .new-chat {
    display: flex; align-items: center; gap: 9px; width: 100%;
    padding: 11px 14px; border-radius: var(--radius-sm); cursor: pointer;
    background: var(--surface); border: 1px solid var(--border-strong);
    font: inherit; font-weight: 600; font-size: 14.5px; color: var(--text);
    box-shadow: var(--shadow-sm); transition: all .18s ease;
  }
  .new-chat:hover { border-color: var(--accent-line); box-shadow: var(--shadow), var(--shadow-glow); transform: translateY(-1px); }
  .sb-search {
    margin-top: 10px; display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-radius: var(--radius-sm);
    background: rgba(0,0,0,0.025); color: var(--text-faint); font-size: 13.5px;
  }
  .sb-search input { border: none; background: none; font: inherit; color: var(--text); width: 100%; outline: none; }

  .sb-scroll { flex: 1; overflow-y: auto; padding: 6px 12px 12px; }
  .sb-scroll::-webkit-scrollbar { width: 8px; }
  .sb-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 2px solid var(--surface-2); }
  .hist-group { margin-top: 14px; }
  .hist-label { font-size: 11.5px; font-weight: 700; color: var(--text-faint); padding: 4px 10px; letter-spacing: .01em; }
  .hist-item {
    display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 10px;
    cursor: pointer; color: var(--text-muted); font-size: 14px; font-weight: 500;
    transition: background .15s ease, color .15s ease; position: relative;
    white-space: nowrap; overflow: hidden;
  }
  .hist-item .ht { overflow: hidden; text-overflow: ellipsis; }
  .hist-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
  .hist-item.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: var(--shadow-sm); }
  .hist-item.active::before {
    content:""; position:absolute; inset-inline-start: 0; top: 18%; bottom: 18%;
    width: 3px; border-radius: 3px; background: var(--accent);
  }

  .sb-foot { padding: 12px; border-top: 1px solid var(--border); }
  .user-row { display: flex; align-items: center; gap: 10px; padding: 8px 8px; border-radius: 12px; cursor: pointer; transition: background .15s; }
  .user-row:hover { background: rgba(0,0,0,0.04); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-3); display: grid; place-items: center; font-weight: 700; font-size: 13px; color: var(--text-muted); flex-shrink: 0; }
  .user-meta { line-height: 1.25; }
  .user-meta b { font-size: 13.5px; font-weight: 700; }
  .user-meta span { font-size: 11.5px; color: var(--text-faint); }

  /* ---------- Main ---------- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
  .topbar {
    height: 58px; flex-shrink: 0; display: flex; align-items: center; gap: 12px;
    padding: 0 18px; border-bottom: 1px solid transparent;
    transition: border-color .25s, background .25s; position: relative; z-index: 5;
  }
  .topbar.scrolled { border-color: var(--border); background: rgba(250,248,244,0.82); backdrop-filter: blur(12px); }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center;
    cursor: pointer; color: var(--text-muted); background: none; border: none; transition: all .15s;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.05); color: var(--text); }
  .topbar-title { font-weight: 700; font-size: 15.5px; display: flex; align-items: center; gap: 8px; }
  .model-pill {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); box-shadow: 0 0 0 0 rgba(21,128,61,.5); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(21,128,61,.45);} 70%{box-shadow:0 0 0 6px rgba(21,128,61,0);} 100%{box-shadow:0 0 0 0 rgba(21,128,61,0);} }

  .scroll-area { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
  .scroll-area::-webkit-scrollbar { width: 11px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; border: 3px solid var(--bg); }
  .thread { max-width: var(--col-w); margin: 0 auto; padding: 30px var(--pad) 200px; }

  /* ---------- Empty / welcome ---------- */
  .welcome { max-width: var(--col-w); margin: 0 auto; padding: clamp(40px, 11vh, 120px) var(--pad) 40px; text-align: center; }
  .welcome .wmark {
    width: 60px; height: 60px; border-radius: 18px; margin: 0 auto 22px;
    background: linear-gradient(150deg, var(--accent), #5B8DEF); color:#fff;
    display: grid; place-items: center; box-shadow: 0 12px 30px -10px var(--accent-line);
    animation: floaty 5s ease-in-out infinite;
  }
  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .welcome h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 8px; }
  .welcome p { font-size: 16.5px; color: var(--text-muted); margin: 0 auto; max-width: 460px; }
  .welcome .disclaim { font-size: 12.5px; color: var(--text-faint); margin-top: 14px; }

  /* ---------- Messages ---------- */
  .msg { margin-bottom: var(--msg-gap); animation: rise .45s cubic-bezier(.2,.7,.3,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  .msg.user { display: flex; justify-content: flex-start; }
  .bubble {
    max-width: 82%; padding: 13px 17px; border-radius: var(--radius);
    background: var(--accent); color: #fff; font-weight: 500; font-size: 15.5px;
    box-shadow: var(--shadow); border-end-start-radius: 6px;
  }
  [data-bubble="outline"] .bubble { background: var(--surface); color: var(--text); border: 1.5px solid var(--accent-line); box-shadow: var(--shadow-sm); }
  [data-bubble="minimal"] .bubble { background: var(--surface-3); color: var(--text); box-shadow: none; }

  .ai { display: flex; gap: 14px; align-items: flex-start; }
  .ai-avatar {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; margin-top: 2px;
    background: linear-gradient(150deg, var(--accent), #5B8DEF); color: #fff;
    display: grid; place-items: center; box-shadow: 0 4px 12px -4px var(--accent-line);
  }
  .ai-body { flex: 1; min-width: 0; }
  .ai-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; display:flex; align-items:center; gap:7px; }
  .ai-name span { font-size: 11px; font-weight: 600; color: var(--text-faint); }
  .ai-intro { font-size: 16px; line-height: 1.72; color: var(--text); }
  .caret { display: inline-block; width: 8px; height: 1.05em; background: var(--accent); border-radius: 2px; vertical-align: text-bottom; margin-inline-start: 2px; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

  /* ---------- Thinking ---------- */
  .thinking { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); }
  .think-head { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14.5px; }
  .think-head .shimmer {
    background: linear-gradient(90deg, var(--text-muted) 25%, var(--accent) 50%, var(--text-muted) 75%);
    background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: sh 1.6s linear infinite;
  }
  @keyframes sh { from{background-position:200% 0} to{background-position:-200% 0} }
  .think-steps { margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  .think-step { display: flex; align-items: center; gap: 9px; font-size: 13.5px; color: var(--text-muted); animation: rise .35s; }
  .think-step .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border-strong); flex-shrink: 0; position: relative; }
  .think-step.done .dot { border-color: var(--accent); background: var(--accent); }
  .think-step.done .dot::after { content:""; position:absolute; inset:0; margin:auto; width:5px; height:8px; border:solid #fff; border-width:0 2px 2px 0; transform: rotate(45deg) translate(-1px,-1px); }
  .think-spinner { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--accent-soft); border-top-color: var(--accent); animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Analysis cards ---------- */
  .analysis { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .acard { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow-sm); overflow: hidden; transition: box-shadow .2s, border-color .2s; animation: rise .5s; }
  .acard:hover { border-color: var(--border-strong); box-shadow: var(--shadow); }
  .acard-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .acard-ic { width: 32px; height: 32px; border-radius: 9px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
  .acard-tt { flex: 1; min-width: 0; }
  .acard-tt b { font-size: 15.5px; font-weight: 700; display: block; }
  .acard-tt small { font-size: 13px; color: var(--text-muted); font-weight: 500; display: block; margin-top: 1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chev { color: var(--text-faint); transition: transform .25s ease; flex-shrink: 0; }
  .acard.open .chev { transform: rotate(180deg); }
  .acard-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .3s ease; }
  .acard.open .acard-body { grid-template-rows: 1fr; }
  .acard-body > div { overflow: hidden; }
  .acard-inner { padding: 2px 16px 18px; }
  .acard-inner p { margin: 0 0 12px; font-size: 14.8px; line-height: 1.7; color: var(--text); }
  .acard-inner p:last-child { margin-bottom: 0; }
  .acard-inner ul { margin: 6px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .acard-inner li { display: flex; align-items: center; gap: 9px; font-size: 14.3px; color: var(--text); padding-inline-start: 2px; }
  .acard-inner li::before { content:""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .warn-box { display: flex; gap: 10px; padding: 11px 13px; border-radius: var(--radius-sm); background: var(--warn-soft); color: var(--warn); font-size: 13.8px; font-weight: 600; line-height: 1.55; margin-top: 4px; }
  .warn-box svg { flex-shrink: 0; margin-top: 2px; }

  /* stat grid */
  .stat-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 14px; }
  .stat-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 12px; padding: 9px 12px; border-radius: 10px; background: var(--surface-2); }
  .stat-row .sl { font-size: 13.5px; color: var(--text-muted); font-weight: 500; }
  .stat-val { font-size: 15px; font-weight: 600; min-width: 48px; text-align: center; padding: 2px 8px; border-radius: 7px; }
  .stat-val.home { background: rgba(0,0,0,0.04); color: var(--text); }
  .stat-val.away { background: var(--accent-soft); color: var(--accent); }

  /* final lean */
  .final { margin-top: 12px; border-radius: var(--radius); padding: 18px 18px; background: linear-gradient(150deg, #F1F5FF, #FBFAFF); border: 1px solid var(--accent-line); animation: rise .5s; }
  .final-head { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 16px; margin-bottom: 8px; }
  .final-head .fic { width: 30px; height: 30px; border-radius: 9px; background: var(--accent); color: #fff; display: grid; place-items: center; }
  .final p { margin: 0 0 14px; font-size: 15px; line-height: 1.7; }
  .conf-row { display: flex; align-items: center; gap: 12px; }
  .conf-bar { flex: 1; height: 9px; border-radius: 999px; background: rgba(37,99,235,.12); overflow: hidden; }
  .conf-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), #5B8DEF); width: 0; transition: width 1.1s cubic-bezier(.2,.8,.2,1); }
  .conf-label { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .conf-num { font-weight: 800; }

  .msg-actions { display: flex; gap: 4px; margin-top: 12px; opacity: 0; transition: opacity .2s; }
  .ai-body:hover .msg-actions { opacity: 1; }
  .act-btn { display: flex; align-items: center; gap: 6px; font: inherit; font-size: 12.5px; font-weight: 600; color: var(--text-muted); background: none; border: 1px solid transparent; padding: 5px 9px; border-radius: 8px; cursor: pointer; transition: all .15s; }
  .act-btn:hover { background: var(--surface-2); color: var(--text); }

  /* ---------- Composer ---------- */
  .composer-wrap {
    position: absolute; inset-inline: 0; bottom: 0;
    padding: 0 var(--pad) 22px; pointer-events: none;
    background: linear-gradient(to top, var(--bg) 38%, rgba(250,248,244,0) 100%);
  }
  .composer-inner { max-width: var(--col-w); margin: 0 auto; pointer-events: auto; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px; padding: 8px 13px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border-strong); color: var(--text);
    font: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer; white-space: nowrap;
    box-shadow: var(--shadow-sm); transition: all .16s ease; animation: rise .4s;
  }
  .chip:hover { border-color: var(--accent-line); color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
  .chip svg { color: var(--accent); }

  .composer {
    display: flex; align-items: flex-end; gap: 10px; padding: 10px 10px 10px 14px;
    background: var(--surface); border: 1.5px solid var(--border-strong); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg); transition: border-color .2s, box-shadow .2s;
  }
  .composer.focus { border-color: var(--accent); box-shadow: var(--shadow-lg), 0 0 0 4px var(--accent-soft); }
  .composer textarea {
    flex: 1; border: none; outline: none; background: none; resize: none; font: inherit;
    font-size: 16px; line-height: 1.55; color: var(--text); max-height: 180px; padding: 7px 4px;
  }
  .composer textarea::placeholder { color: var(--text-faint); }
  .send {
    width: 42px; height: 42px; border-radius: 13px; flex-shrink: 0; border: none; cursor: pointer;
    background: var(--accent); color: #fff; display: grid; place-items: center;
    transition: transform .14s ease, background .14s, opacity .2s; box-shadow: 0 4px 12px -3px var(--accent-line);
  }
  .send:hover:not(:disabled) { background: var(--accent-press); transform: scale(1.06); }
  .send:active:not(:disabled) { transform: scale(.94); }
  .send:disabled { opacity: .4; cursor: default; background: var(--surface-3); color: var(--text-faint); box-shadow: none; }
  .composer-foot { text-align: center; font-size: 11.5px; color: var(--text-faint); margin-top: 9px; }
  .composer-foot b { color: var(--text-muted); font-weight: 600; }

  .scroll-btn {
    position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
    width: 38px; height: 38px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border-strong);
    box-shadow: var(--shadow); cursor: pointer; display: grid; place-items: center; color: var(--text-muted);
    z-index: 6; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
  }
  .scroll-btn.show { opacity: 1; pointer-events: auto; }
  .scroll-btn:hover { color: var(--accent); transform: translateX(-50%) translateY(-2px); }

  @media (max-width: 760px) {
    .sidebar { position: absolute; z-index: 30; height: 100%; box-shadow: var(--shadow-lg); }
    :root { --col-w: 100%; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
/* ============================================================
   DATA
   ============================================================ */
const SUGGESTION_CHIPS = [
  { id: "analyze", label: "נתח את המשחק", icon: "target" },
  { id: "compare", label: "השווה משחקים", icon: "compare" },
  { id: "odds",    label: "הסבר את היחסים", icon: "percent" },
  { id: "value",   label: "אתר הימורי ערך", icon: "spark" },
  { id: "deep",    label: "ניתוח סטטיסטי מעמיק", icon: "chart" },
];

const HISTORY = [
  {
    group: "היום",
    items: [
      { id: "h1", title: "ארסנל נגד מנצ'סטר סיטי", active: true },
      { id: "h2", title: "ערך ביחסים — מחזור הפרמייר ליג" },
    ],
  },
  {
    group: "השבוע",
    items: [
      { id: "h3", title: "ליגת האלופות — חצי גמר" },
      { id: "h4", title: "NBA: סלטיקס מול נאגטס" },
      { id: "h5", title: "מומנטום: ריאל מדריד בחוץ" },
    ],
  },
  {
    group: "קודם יותר",
    items: [
      { id: "h6", title: "טניס — גמר רולאן גארוס" },
      { id: "h7", title: "ניתוח קרנות וכרטיסים" },
      { id: "h8", title: "מודל xG מול קו ההימור" },
    ],
  },
];

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" style={{width:56,height:22,border:'none',borderRadius:6,padding:0,cursor:'pointer'}} value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }} onClick={() => onChange(o)}>
              {rest.length > 0 && <span>{rest.slice(0,4).map((c,j) => <i key={j} style={{background:c}} />)}</span>}
              {on && <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke="#fff" /></svg>}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

          </div>
        </div>
        <div className="sb-scroll">
          {HISTORY.map((g) => (
            <div className="hist-group" key={g.group}>
              <div className="hist-label">{g.group}</div>
              {g.items.map((it) => (
                <div className={"hist-item" + (it.active ? " active" : "")} key={it.id}>
                  <span className="ht">{it.title}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
        <div className="sb-foot">
          <div className="user-row">
            <div className="avatar">דכ</div>
            <div className="user-meta">
              <b>דניאל כהן</b><br />
              <span>תוכנית Pro</span>
            </div>
          </div>
        </div>
      </div>
    </aside>
  );
}

function ThinkingBlock({ step }) {
  return (
    <div className="ai">
      <div className="ai-avatar"><Icon name="bolt" size={18} /></div>
      <div className="ai-body">
        <div className="thinking">
          <div className="think-head">
            <div className="think-spinner" />
            <span className="shimmer">מנתח לעומק…</span>
          </div>
          <div className="think-steps">
            {THINKING_STEPS.slice(0, step + 1).map((s, i) => (
              <div className={"think-step" + (i < step ? " done" : "")} key={i}>
                <span className="dot" />{s}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function AnalysisCard({ data, open, onToggle }) {
  return (
    <div className={"acard" + (open ? " open" : "")}>
      <div className="acard-head" onClick={onToggle}>
        <div className="acard-ic"><Icon name={data.icon} size={18} /></div>
        <div className="acard-tt">
          <b>{data.title}</b>
          <small>{data.summary}</small>
        </div>
        <span className="chev"><Icon name="chevron" size={18} /></span>
      </div>
      <div className="acard-body">
        <div>
          <div className="acard-inner">
            {data.stats && (
              <div className="stat-grid">
                {data.stats.map((s, i) => (
                  <div className="stat-row" key={i}>
                    <span className="sl">{s.label}</span>
                    <span className="stat-val home mono">{s.home}</span>
                    <span className="stat-val away mono">{s.away}</span>
                  </div>
                ))}
              </div>
            )}
            {data.body.map((b, i) => {
              if (b.type === "p") return <p key={i}>{b.text}</p>;
              if (b.type === "list") return <ul key={i}>{b.items.map((t, j) => <li key={j}>{t}</li>)}</ul>;
              if (b.type === "warn") return (
                <div className="warn-box" key={i}><Icon name="warn" size={17} /><span>{b.text}</span></div>
              );
              return null;
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function FinalLean({ show }) {
  const [w, setW] = React.useState(0);
  React.useEffect(() => {
    if (show) { const t = setTimeout(() => setW(FINAL_LEAN.confidence), 120); return () => clearTimeout(t); }
  }, [show]);
  return (
    <div className="final">
      <div className="final-head"><div className="fic"><Icon name="flag" size={17} /></div>{FINAL_LEAN.title}</div>
      <p>{FINAL_LEAN.text}</p>
      <div className="conf-row">
        <div className="conf-bar"><div className="conf-fill" style={{ width: w + "%" }} /></div>
        <span className="conf-label"><span className="conf-num mono">{FINAL_LEAN.confidence}%</span> · {FINAL_LEAN.confidenceLabel}</span>
      </div>
    </div>
  );
}

function Composer({ onSend, busy, showChips }) {
  const [val, setVal] = React.useState("");
  const [focus, setFocus] = React.useState(false);
  const ref = React.useRef(null);

  const grow = () => { const el = ref.current; if (!el) return; el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 180) + "px"; };
  React.useEffect(grow, [val]);

  const submit = () => { const t = val.trim(); if (!t || busy) return; onSend(t); setVal(""); };
  const onKey = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); } };

  return (
    <div className="composer-wrap">
      <div className="composer-inner">
        {showChips && (
          <div className="chips">
            {SUGGESTION_CHIPS.map((c, i) => (
              <button className="chip" key={c.id} style={{ animationDelay: i * 55 + "ms" }} onClick={() => !busy && onSend(c.label)}>
                <Icon name={c.icon} size={15} />{c.label}
              </button>
            ))}
          </div>
        )}
        <div className={"composer" + (focus ? " focus" : "")}>
          <textarea
            ref={ref} rows={1} value={val} placeholder="שאל את הפוגע על משחק, יחסים או סטטיסטיקה…"
            onChange={(e) => setVal(e.target.value)} onKeyDown={onKey}
            onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
          />
          <button className="send" disabled={!val.trim() || busy} onClick={submit} aria-label="שלח">
            <Icon name="send" size={19} />
          </button>
        </div>
        <div className="composer-foot">
          הפוגע מספק <b>הערכות הסתברותיות</b> ולא הבטחות. הימור באחריות · גיל 18+
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
const TWEAK_DEFAULTS = {
  "bubble": "רכה",
  "accent": "#2563EB",
  "density": "רגיל",
  "speed": "רגיל"
};

const BUBBLE_MAP  = { "רכה": "soft", "קו": "outline", "מינימלי": "minimal" };
const DENSITY_MAP = { "קומפקטי": "compact", "רגיל": "regular", "מרווח": "comfy" };
const SPEED_MAP   = { "איטי": 0.5, "רגיל": 1, "מהיר": 2.2 };

function hexToRgb(h) {
  const m = h.replace("#", "");
  const n = parseInt(m.length === 3 ? m.split("").map((c) => c + c).join("") : m, 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

function AiMessage({ m, idx, onToggle }) {
  if (m.phase === "thinking") return <ThinkingBlock step={m.thinkStep} />;
  const text = m.intro.slice(0, m.streamLen);
  return (
    <div className="ai">
      <div className="ai-avatar"><Icon name="bolt" size={18} /></div>
      <div className="ai-body">
        <div className="ai-name">הפוגע <span>· מנתח ספורט</span></div>
        <div className="ai-intro">
          {text}{m.phase === "streaming" && <span className="caret" />}
        </div>
        {m.phase !== "streaming" && (
          <div className="analysis">
            {m.analysis.slice(0, m.revealed).map((a) => (
              <AnalysisCard key={a.id} data={a} open={!!m.open[a.id]} onToggle={() => onToggle(idx, a.id)} />
            ))}
          </div>
        )}
        {m.showFinal && <FinalLean show={true} />}
        {m.phase === "done" && (
          <div className="msg-actions">
            <button className="act-btn"><Icon name="copy" size={14} /> העתק</button>
            <button className="act-btn"><Icon name="refresh" size={14} /> נסח מחדש</button>
            <button className="act-btn"><Icon name="share" size={14} /> שתף</button>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [messages, setMessages] = React.useState([]);
  const [busy, setBusy] = React.useState(false);
  const [scrolled, setScrolled] = React.useState(false);
  const [showScrollBtn, setShowScrollBtn] = React.useState(false);
  const [collapsed, setCollapsed] = React.useState(false);
  const scrollRef = React.useRef(null);
  const atBottom = React.useRef(true);
  const runRef = React.useRef(0);

  React.useEffect(() => {
    const root = document.documentElement;
    root.setAttribute("data-bubble", BUBBLE_MAP[t.bubble] || "soft");
    root.setAttribute("data-density", DENSITY_MAP[t.density] || "regular");
    const [r, g, b] = hexToRgb(t.accent);
    root.style.setProperty("--accent", t.accent);
    root.style.setProperty("--accent-soft", `rgba(${r},${g},${b},0.10)`);
    root.style.setProperty("--accent-line", `rgba(${r},${g},${b},0.24)`);
    root.style.setProperty("--accent-press", `rgb(${Math.round(r*0.82)},${Math.round(g*0.82)},${Math.round(b*0.82)})`);
  }, [t.bubble, t.density, t.accent]);

  const speed = SPEED_MAP[t.speed] || 1;

  const patchAi = React.useCallback((patch) => {
    setMessages((m) => {
      const c = [...m];
      for (let i = c.length - 1; i >= 0; i--) {
        if (c[i].role === "ai") {
          const np = typeof patch === "function" ? patch(c[i]) : patch;
          c[i] = { ...c[i], ...np };
          break;
        }
      }
      return c;
    });
  }, []);

  const scrollDown = (smooth = true) => {
    const el = scrollRef.current;
    if (el) el.scrollTo({ top: el.scrollHeight, behavior: smooth ? "smooth" : "auto" });
  };

  React.useEffect(() => { if (atBottom.current) scrollDown(); });

  const onScroll = () => {
    const el = scrollRef.current; if (!el) return;
    const dist = el.scrollHeight - el.scrollTop - el.clientHeight;
    atBottom.current = dist < 130;
    setShowScrollBtn(dist > 280);
    setScrolled(el.scrollTop > 8);
  };

  const toggleCard = (idx, id) => {
    setMessages((m) => { const c = [...m]; c[idx] = { ...c[idx], open: { ...c[idx].open, [id]: !c[idx].open[id] } }; return c; });
  };

  const newChat = () => { runRef.current++; setBusy(false); setMessages([]); atBottom.current = true; };

  const send = async (text) => {
    if (busy) return;
    const run = ++runRef.current;
    setBusy(true);
    atBottom.current = true;
    setMessages((m) => [...m,
      { role: "user", text },
      { role: "ai", phase: "thinking", thinkStep: 0, streamLen: 0, intro: INTRO_TEXT, analysis: ANALYSIS, revealed: 0, open: {}, showFinal: false },
    ]);

    for (let i = 0; i < THINKING_STEPS.length; i++) {
      await sleep(560 / speed);
      if (run !== runRef.current) return;
      patchAi({ thinkStep: i });
    }
    await sleep(420 / speed);
    if (run !== runRef.current) return;

    patchAi({ phase: "streaming", streamLen: 0 });
    const full = INTRO_TEXT;
    const step = 3;
    for (let n = 0; n <= full.length; n += step) {
      await sleep(20 / speed);
      if (run !== runRef.current) return;
      patchAi({ streamLen: n });
    }
    patchAi({ streamLen: full.length });
    await sleep(280 / speed);
    if (run !== runRef.current) return;

    patchAi({ phase: "analysis", revealed: 0, open: Object.fromEntries(ANALYSIS.map((a) => [a.id, a.open])) });
    for (let i = 0; i < ANALYSIS.length; i++) {
      await sleep(220 / speed);
      if (run !== runRef.current) return;
      patchAi((prev) => ({ revealed: prev.revealed + 1 }));
    }
    await sleep(260 / speed);
    if (run !== runRef.current) return;
    patchAi({ showFinal: true });
    await sleep(200);
    patchAi({ phase: "done" });
    setBusy(false);
  };

  const empty = messages.length === 0;

  return (
    <div className="app">
      <Sidebar collapsed={collapsed} onNewChat={newChat} />
      <div className="main">
        <div className={"topbar" + (scrolled ? " scrolled" : "")}>
          <button className="icon-btn" onClick={() => setCollapsed((c) => !c)} aria-label="תפריט">
            <Icon name="sidebar" size={19} />
          </button>
          <div className="topbar-title">ארסנל נגד מנצ'סטר סיטי</div>
          <div style={{ flex: 1 }} />
          <div className="model-pill"><span className="pulse-dot" />הפוגע · 2.5 Pro</div>
        </div>

        <div className="scroll-area" ref={scrollRef} onScroll={onScroll}>
          {empty ? (
            <div className="welcome">
              <div className="wmark"><Icon name="bolt" size={28} /></div>
              <h1>שלום, אני הפוגע</h1>
              <p>בינת ספורט שמנתחת משחקים, סטטיסטיקות ויחסי הימור — ומסבירה את ההיגיון מאחורי כל הערכה.</p>
              <div className="disclaim">הערכות הסתברותיות בלבד · ללא הבטחת רווח · הימור באחריות</div>
            </div>
          ) : (
            <div className="thread">
              {messages.map((m, i) =>
                m.role === "user"
                  ? <div className="msg user" key={i}><div className="bubble">{m.text}</div></div>
                  : <div className="msg" key={i}><AiMessage m={m} idx={i} onToggle={toggleCard} /></div>
              )}
            </div>
          )}
        </div>

        <button className={"scroll-btn" + (showScrollBtn ? " show" : "")} onClick={() => scrollDown()} aria-label="גלול למטה">
          <Icon name="chevron" size={18} />
        </button>

        <Composer onSend={send} busy={busy} showChips={empty} />
      </div>

      <TweaksPanel>
        <TweakSection label="הודעות" />
        <TweakRadio label="סגנון בועה" value={t.bubble} options={["רכה", "קו", "מינימלי"]} onChange={(v) => setTweak("bubble", v)} />
        <TweakSection label="מראה" />
        <TweakColor label="צבע מותג" value={t.accent} options={["#2563EB", "#4F46E5", "#0D9488", "#DB6B3C"]} onChange={(v) => setTweak("accent", v)} />
        <TweakRadio label="צפיפות" value={t.density} options={["קומפקטי", "רגיל", "מרווח"]} onChange={(v) => setTweak("density", v)} />
        <TweakRadio label="מהירות סטרימינג" value={t.speed} options={["איטי", "רגיל", "מהיר"]} onChange={(v) => setTweak("speed", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
